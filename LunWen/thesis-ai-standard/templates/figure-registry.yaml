schema_version: "2.0"
language: "zh-CN"
encoding: "utf-8"

rules:
  caption:
    figure: "图题置于图下"
    table: "表题置于表上"
  numbering:
    mode: "按章编号"
    figure_pattern: "图{chapter}-{index}"
    table_pattern: "表{chapter}-{index}"
  source_policy:
    editable_source_required:
      - "architecture"
      - "flowchart"
      - "er_diagram"
      - "sequence"
    screenshot_allowed:
      - "ui_screenshot"
      - "test_report"

figures:
