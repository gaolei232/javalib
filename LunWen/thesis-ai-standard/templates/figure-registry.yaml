    chapter: "4"
    type: "architecture"
    purpose: "展示前后端分离三层架构及通信方式"
    source_kind: "drawio"
    status: "planned"
    risk_notes: "待补充架构图源文件"
    first_mentioned_in: "第4.1节"

  - id: "图4-2"
