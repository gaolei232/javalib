  - id: "conclusion"
    title: "结论"
    purpose: "总结全文工作并展望改进方向"
    required_sections:
      - "工作总结"
      - "主要成果"
      - "不足与展望"
    evidence_required:
      - "全文已出现的结果和证据"
    recommended_outputs:
      figures: []
      tables: []

figure_policy:
  caption_position: "图题置于图下"
  table_caption_position: "表题置于表上"
  equation_position: "公式独立成行，编号居右"
  source_required: true
  source_types:
    editable_diagram:
      - "架构图"
      - "流程图"
      - "E-R图"
    screenshot:
      - "运行界面"
      - "测试结果"
    table:
      - "字段表"
      - "测试用例表"
      - "测试结果表"
  naming_pattern: "thesis-figure-{chapter}-{index}"

evidence_index:
  project_evidence: "paper-context/evidence/project-evidence.json"
  code_structure: "paper-context/evidence/code-structure.md"
  tech_stack: "paper-context/evidence/tech-stack.md"
  database_schema: "paper-context/evidence/database-schema.md"
  api_list: "paper-context/evidence/api-list.md"
  test_results: "paper-context/evidence/test-results.md"
  data_dictionary: "paper-context/evidence/data-dictionary.md"

ai_rules:
  must_not_fabricate:
