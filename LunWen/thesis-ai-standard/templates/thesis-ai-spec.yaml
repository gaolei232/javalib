  - id: "chapter-5"
    title: "系统详细设计与实现"
    purpose: "关键模块的实现分析，包括认证、预约、冲突检测、实时同步等"
    required_sections:
      - "用户认证模块实现"
      - "座位预约模块实现"
      - "座位状态实时同步实现"
      - "管理员后台模块实现"
      - "学生统计模块实现"
    evidence_required:
      - "AuthServiceImpl.java"
      - "SeatService.java"
      - "SeatStatusWebSocketHandler.java"
      - "前端Vue组件代码"
    recommended_outputs:
