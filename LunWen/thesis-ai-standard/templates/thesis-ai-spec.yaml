    - "接口路径"
    - "参考文献"
    - "系统功能"
  must_check:
    - "学校模板优先级"
    - "章节层级"
    - "图表编号"
    - "正文引用"
    - "术语一致性"
    - "证据链完整性"
    - "参考文献引用闭环"
