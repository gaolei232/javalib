        - "WebSocket消息截图"
        - "后台管理页面截图"
      tables:
        - "核心接口列表"

  - id: "chapter-6"
    title: "系统测试与结果分析"
    purpose: "通过实际构建和接口测试验证系统功能"
    required_sections:
      - "测试环境"
      - "功能测试"
      - "测试结果分析"
      - "存在的问题与改进方向"
    evidence_required:
      - "npm run build构建结果"
      - "Maven打包结果"
      - "接口测试结果"
    recommended_outputs:
      figures:
        - "编译/打包截图"
        - "测试结果截图"
      tables:
