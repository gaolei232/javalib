name: CI/CD for Vue + Spring Boot

on:
  push:
    branches:
      - main

jobs:
  build_vue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build

      - name: Upload Vue build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vue-build
          path: dist/

  build_springboot:
    runs-on: ubuntu-latest
    needs: build_vue
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build_springboot
    steps:
      - name: Download Vue artifacts
        uses: actions/download-artifact@v4
        with:
          name: vue-build
          path: ./dist

      - name: Download Spring Boot JAR
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: ./target

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files to server
        run: |
          scp -r ./dist/* "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_DIR }}/dist/"
          scp ./target/*.jar "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_DIR }}/app.jar"

      - name: Restart Spring Boot service
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.DEPLOY_DIR }}"
            pkill -f "java -jar app.jar" || true
            nohup java -jar app.jar > output.log 2>&1 &
          EOF

