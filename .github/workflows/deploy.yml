name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug secret (check username)
      env:
        CHECK_USER: ${{ secrets.SERVER_USERNAME }}
      run: |
        echo "SERVER_USERNAME is set: $([ -n "$CHECK_USER" ] && echo YES || echo NO)"
        echo "SERVER_USERNAME length: ${#CHECK_USER}"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /home/ci-cd/javalib
          git pull origin main

          # 后端构建
          mvn clean package -DskipTests

          # 前端构建
          npm install && npm run build

          # 部署后端
          sudo systemctl stop j-lib.service
          cp target/springboot-vue3-system-1.0.0.jar /home/springboot-vue3-system-1.0.0.jar
          sudo systemctl daemon-reload
          sudo systemctl start j-lib.service

          # 部署前端
          sudo rm -rf /home/g/*
          sudo cp -r dist/* /home/g
          sudo systemctl restart nginx
