name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # === 构建后端 ===
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build backend
      run: mvn clean package -DskipTests

    # === 构建前端 ===
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Build frontend
      run: |
        npm install
        npm run build

    # === 上传产物到服务器 ===
    - name: Upload artifacts via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "target/springboot-vue3-system-1.0.0.jar,dist"
        target: "/home/ci-cd/javalib"
        strip_components: 0

    # === 在服务器上部署 ===
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # 部署后端
          sudo systemctl stop j-lib.service
          cp /home/ci-cd/javalib/target/springboot-vue3-system-1.0.0.jar /home/springboot-vue3-system-1.0.0.jar
          sudo systemctl daemon-reload
          sudo systemctl start j-lib.service

          # 部署前端
          sudo rm -rf /home/g/*
          sudo cp -r /home/ci-cd/javalib/dist/* /home/g

          # 重启 Nginx
          sudo systemctl restart nginx
